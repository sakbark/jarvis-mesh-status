# Upptime configuration for JARVIS mesh
# All endpoints must be publicly reachable (no 192.168.x or 100.x)
owner: sakbark
repo: jarvis-mesh-status

sites:
  # Core public surface (Tailscale Funnel — publicly served)
  - name: JARVIS Webhook (media)
    url: https://jarvis.tail75e75.ts.net/media
    expectedStatusCodes:
      - 200
      - 301
      - 302
      - 401
      - 404
  - name: JARVIS Speak Endpoint
    url: https://jarvis.tail75e75.ts.net/speak
    expectedStatusCodes:
      - 200
      - 401
      - 404
      - 405
  - name: JARVIS Messages Endpoint
    url: https://jarvis.tail75e75.ts.net/messages
    expectedStatusCodes:
      - 200
      - 401
      - 404
      - 405
  - name: JARVIS ntfy
    url: https://jarvis.tail75e75.ts.net/ntfy
    expectedStatusCodes:
      - 200
      - 301
      - 404

  # Matrix homeserver (public, also funneled)
  - name: Matrix Homeserver
    url: https://matrix.tail75e75.ts.net/_matrix/client/versions
    expectedStatusCodes:
      - 200

  # Third-party dependencies JARVIS relies on
  - name: Healthchecks.io
    url: https://healthchecks.io
    expectedStatusCodes:
      - 200
  - name: Pushover Status
    url: https://status.pushover.net
    expectedStatusCodes:
      - 200
  - name: Notion
    url: https://www.notion.so
    expectedStatusCodes:
      - 200
  - name: Todoist
    url: https://todoist.com
    expectedStatusCodes:
      - 200
      - 301
      - 302
  - name: Tailscale Control Plane
    url: https://login.tailscale.com
    expectedStatusCodes:
      - 200
      - 301
      - 302

status-website:
  baseUrl: /jarvis-mesh-status
  logoUrl: https://raw.githubusercontent.com/upptime/upptime.js.org/master/static/img/icon.svg
  name: JARVIS Mesh Status
  introTitle: "**JARVIS Mesh Status** — public observability for Saad's AI mesh"
  introMessage: Live status of JARVIS public endpoints and third-party dependencies. Checked every 5 minutes from GitHub Actions runners. Internal LAN and Tailscale-only services are monitored separately (Uptime.com + Healthchecks.io).
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/sakbark/jarvis-mesh-status

notifications:
  - type: pushover
    apiKey: "$PUSHOVER_APP_TOKEN"
    userKey: "$PUSHOVER_USER_KEY"
    priority: 1

# Run uptime checks every 5 minutes (workflow cron), response-time every 6h, summary hourly
# These are set in the workflow files, not here.
